<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Timezone Clock</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white;
            text-align: center;
            padding: 50px;
        }
        .clock {
            font-size: 3em;
        }
        .timezone-buttons {
            margin: 20px 0;
        }
        button {
            background: #ff5722;
            border: none;
            color: white;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background: #e64a19;
        }
    </style>
</head>
<body>
    <h1>Multi-Timezone Digital Clock</h1>
    <div class="clock" id="clock">Loading...</div>
    <div class="timezone-buttons">
        <button onclick="setTimezone('UTC')">UTC</button>
        <button onclick="setTimezone('America/New_York')">New York</button>
        <button onclick="setTimezone('Europe/London')">London</button>
        <button onclick="setTimezone('Asia/Tokyo')">Tokyo</button>
        <button onclick="setTimezone('Australia/Sydney')">Sydney</button>
        <input type="text" id="custom-timezone" placeholder="Custom timezone (e.g., Asia/Kolkata)">
        <button onclick="addCustomTimezone()">Add Custom Timezone</button>
    </div>
    <script>
        let currentTimezone = 'UTC';

        function setTimezone(timezone) {
            currentTimezone = timezone;
            updateClock();
        }

        function addCustomTimezone() {
            const customTimezone = document.getElementById('custom-timezone').value;
            if (customTimezone) {
                setTimezone(customTimezone);
            }
        }

        function updateClock() {
            const options = { timeZone: currentTimezone, hour: '2-digit', minute: '2-digit', second: '2-digit' };
            const date = new Date().toLocaleTimeString('en-US', options);
            document.getElementById('clock').innerText = date;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
